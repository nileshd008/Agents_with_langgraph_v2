services:
  sandbox_db:
    image: mysql:8.4
    container_name: sandbox_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sandbox_workspace
      MYSQL_USER: sandbox_user
      MYSQL_PASSWORD: sandbox_password

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD-SHELL","mysqladmin ping -h localhost -u sandbox_user -psandbox_password --silent"]